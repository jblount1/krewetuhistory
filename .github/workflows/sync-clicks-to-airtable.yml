name: Sync Clicks to Airtable

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workflow dependencies
        run: python -m pip install ./historical_marker_workflow

      - name: Sync click counts back to Airtable
        env:
          AIRTABLE_PERSONAL_ACCESS_TOKEN: ${{ secrets.AIRTABLE_PERSONAL_ACCESS_TOKEN }}
          AIRTABLE_URL: ${{ secrets.AIRTABLE_URL }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_SUBMISSIONS_TABLE: ${{ secrets.AIRTABLE_SUBMISSIONS_TABLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
          SUPABASE_SUBMISSIONS_TABLE: ${{ secrets.SUPABASE_SUBMISSIONS_TABLE }}
        run: PYTHONPATH=historical_marker_workflow/src python -m marker_workflow.cli sync-clicks-to-airtable
