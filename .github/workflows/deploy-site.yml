name: Deploy Historical Marker Site

on:
  push:
    branches:
      - main
      - codex/**
    paths:
      - "historical_marker_site/**"
      - "historical_marker_workflow/**"
      - ".github/workflows/deploy-site.yml"
      - "netlify.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site data from Airtable
        if: ${{ secrets.AIRTABLE_PERSONAL_ACCESS_TOKEN != '' }}
        env:
          AIRTABLE_PERSONAL_ACCESS_TOKEN: ${{ secrets.AIRTABLE_PERSONAL_ACCESS_TOKEN }}
          AIRTABLE_URL: ${{ secrets.AIRTABLE_URL }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_SUBMISSIONS_TABLE: ${{ secrets.AIRTABLE_SUBMISSIONS_TABLE }}
          AIRTABLE_ASSETS_TABLE: ${{ secrets.AIRTABLE_ASSETS_TABLE }}
          AIRTABLE_DISPLAY_QUEUE_TABLE: ${{ secrets.AIRTABLE_DISPLAY_QUEUE_TABLE }}
          SITE_SOURCE_MODE: airtable
        run: PYTHONPATH=historical_marker_workflow/src python -m marker_workflow.cli build-site

      - name: Set up Node for Netlify CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy preview
        if: github.ref != 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir historical_marker_site --message "Preview from ${{ github.ref_name }}"

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir historical_marker_site --prod --message "Production deploy from main"
